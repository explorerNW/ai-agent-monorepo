services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: ai-agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    env_file:
      - ./packages/back-end/micro-service/rabbit-mq/.env # 确保此文件在 .gitignore 中
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  rabbit-mq-service:
    build:
      context: ./packages/back-end/micro-service/rabbit-mq
      dockerfile: Dockerfile
    container_name: ai-agent-rabbitmq-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@${RABBITMQ_HOST}:5672
    env_file:
      - ./packages/back-end/micro-service/rabbit-mq/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-agent-network

  back-end:
    build:
      context: .
      dockerfile: packages/back-end/Dockerfile
      args:
        - FRONT_END_URL=${FRONT_END_URL}
        - FRONT_END_URL_DEV=${FRONT_END_URL_DEV}
    container_name: ai-agent-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONT_END_URL=${FRONT_END_URL}
      - FRONT_END_URL_DEV=${FRONT_END_URL_DEV}
    env_file:
      - ./packages/back-end/.env
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      rabbit-mq-service:
        condition: service_started

  front-end:
    build:
      context: .
      dockerfile: packages/front-end/Dockerfile
      args:
        - VITE_APP_NAME=AI Assistant
        - VITE_APP_VERSION=1.0.0
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: ai-agent-frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    env_file:
      - ./packages/front-end/.env
    depends_on:
      back-end:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-agent-network

volumes:
  backend-uploads:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  ai-agent-network:
    driver: bridge
