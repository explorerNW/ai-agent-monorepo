services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-agent-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-analytics}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    env_file:
      - ./packages/back-end/.env # 确保此文件在 .gitignore 中
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ai-agent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
    env_file:
      - ./packages/back-end/.env # 确保此文件在 .gitignore 中
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  rabbit-mq-service:
    build:
      context: ./packages/back-end/micro-service/rabbit-mq
      dockerfile: Dockerfile
    container_name: ai-agent-rabbitmq-service
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@${RABBITMQ_HOST}:5672
    env_file:
      - ./packages/back-end/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-agent-network
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native interface
    volumes:
      - ./clickhouse-data:/var/lib/clickhouse
      - ./packages/back-end/clickhouse-config.xml:/etc/clickhouse-server/config.xml # 修改路径
      # 添加 users.xml 配置
      - ./packages/back-end/users.xml:/etc/clickhouse-server/users.xml
    env_file:
      - ./packages/back-end/.env
    environment:
      CLICKHOUSE_DB: performance_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "" # 或设置密码
    restart: always
    networks:
      - ai-agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # 增加启动时间
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - "3002:3002"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=vertamedia-clickhouse-datasource
    volumes:
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - clickhouse
    restart: always
    networks:
      - ai-agent-network

  back-end:
    build:
      context: .
      dockerfile: packages/back-end/Dockerfile
    container_name: ai-agent-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONT_END_URL=${FRONT_END_URL}
      - FRONT_END_URL_DEV=${FRONT_END_URL_DEV}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - DB_NAME=${DB_NAME:-analytics}
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DB=performance_db
    env_file:
      - ./packages/back-end/.env
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/parallel/cpu-info || exit 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      rabbit-mq-service:
        condition: service_started
      clickhouse:
        condition: service_healthy
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  front-end:
    build:
      context: .
      dockerfile: packages/front-end/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: ai-agent-frontend
    ports:
      - "443:443"
      # - "80:80"  # Commented out to avoid port conflict - use HTTPS only
    environment:
      - NODE_ENV=production
      - PORT=443
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    env_file:
      - ./packages/front-end/.env
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      back-end:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider https://127.0.0.1:443/ --no-check-certificate || exit 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 45s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: pause
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  backend-uploads:
    driver: local
  rabbitmq-data:
    driver: local
  postgres-data:
    driver: local

networks:
  ai-agent-network:
    driver: bridge
