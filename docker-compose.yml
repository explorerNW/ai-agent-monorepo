services:
  back-end:
    build:
      context: .
      dockerfile: packages/back-end/Dockerfile
    container_name: ai-agent-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONT_END_URL=http://niewang.uunat.com:16974
      - FRONT_END_URL_DEV=http://localhost:3001
    env_file:
      - ./packages/back-end/.env
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped
    networks:
      - ai-agent-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 0",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  front-end:
    build:
      context: .
      dockerfile: packages/front-end/Dockerfile
      args:
        - VITE_API_URL=http://niewang.uunat.com:41061
        - VITE_API_BASE_URL=http://niewang.uunat.com:41061
        - VITE_API_URL_DEV=http://localhost:3000
        - VITE_APP_NAME=AI Assistant
        - VITE_APP_VERSION=1.0.0
    container_name: ai-agent-frontend
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACK_END_URL=http://back-end:3000
    env_file:
      - ./packages/front-end/.env
    depends_on:
      back-end:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-agent-network

volumes:
  backend-uploads:
    driver: local

networks:
  ai-agent-network:
    driver: bridge
