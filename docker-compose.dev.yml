services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai-agent-rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data-dev:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - ai-agent-network-dev
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  back-end:
    build:
      context: .
      dockerfile: packages/back-end/Dockerfile
    container_name: ai-agent-backend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - FRONT_END_URL=http://localhost:5173
    env_file:
      - ./packages/back-end/.env
    volumes:
      - ./packages/back-end/src:/app/src
      - backend-uploads-dev:/app/uploads
    command: pnpm run start:dev
    restart: unless-stopped
    networks:
      - ai-agent-network-dev
    depends_on:
      rabbitmq:
        condition: service_healthy

  front-end:
    build:
      context: .
      dockerfile: packages/front-end/Dockerfile.dev
    container_name: ai-agent-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000
      - VITE_API_BASE_URL=http://localhost:3000
    env_file:
      - ./packages/front-end/.env
    volumes:
      - ./packages/front-end:/app
      - /app/node_modules
    depends_on:
      - back-end
    command: pnpm run dev --host 0.0.0.0
    restart: unless-stopped
    networks:
      - ai-agent-network-dev

volumes:
  backend-uploads-dev:
    driver: local
  rabbitmq-data-dev:
    driver: local

networks:
  ai-agent-network-dev:
    driver: bridge
