name: Docker Local CI/CD Pipeline

on:
  push:
    branches: [main] # 如果你的主分支叫 master，记得改成 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: s0.v100.vip # 对应你在 GitHub Secrets 设置的 s0.v100.vip
          port: ${{ secrets.SERVER_PORT }} # 对应你在 GitHub Secrets 设置的 30034
          username: explorernw # 你的服务器登录用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }} # 对应你在 GitHub Secrets 设置的私钥
          debug: true
          script: |
            # ⚠️ 重要：请务必将下面的路径替换为你服务器上真实的项目存放目录！
            cd code-repo/ai-repo/ai-agent-monorepo/

            # 拉取 GitHub 上的最新代码
            git pull origin main

            # 赋予脚本执行权限
            chmod +x docker.sh

            # 执行你的重启部署脚本
            sudo ./docker.sh restart
