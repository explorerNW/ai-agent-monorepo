name: Docker Local CI/CD Pipeline

on:
  push:
    branches: [main] # 如果你的主分支叫 master,记得改成 master

# 添加并发控制,避免相同workflow间的任务堆积
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_DIR: ${{ github.workspace }}
  PROJECT_NAME: ai-agent-monorepo

jobs:
  build-and-deploy:
    environment: ci
    # 使用自托管 Runner，即时启动无等待
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      # 【重要】建议显式 Checkout 代码,除非你确信 Runner 是持久化且已同步的
      - name: Configure Git for Slow Networks
        run: |
          echo "🔧 Configuring Git for optimized network performance..."
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          git config --global http.version HTTP/1.1
          echo "✅ Git network optimization configured"

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 浅克隆加速检出,仅获取最新提交
          fetch-depth: 1
          # 明确指定分支,避免歧义
          ref: ${{ github.ref }}
          # 启用子模块(如果有)
          submodules: false
        timeout-minutes: 10
        continue-on-error: true

      # 如果Checkout失败,尝试使用镜像源重试
      - name: Retry Checkout with Mirror (if failed)
        if: steps.checkout.outcome == 'failure' || steps.checkout.outcome == 'cancelled'
        run: |
          echo "⚠️ Primary checkout failed, retrying with optimized settings..."

          # 清理失败的checkout
          rm -rf ./*
          rm -rf .git

          # 配置Git优化参数(再次确保)
          git init
          git config http.postBuffer 524288000
          git config http.lowSpeedLimit 0
          git config http.lowSpeedTime 999999

          # 尝试多种镜像源
          echo "🔄 Attempting checkout via multiple sources..."

          # 方法1: 直接使用GitHub (带优化参数)
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://github.com/${{ github.repository }}.git . && \
            echo "✅ Checkout succeeded via direct GitHub" && exit 0 || \
          echo "❌ Direct GitHub failed, trying mirror..."

          # 方法2: 使用ghproxy镜像
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://ghproxy.com/https://github.com/${{ github.repository }}.git . && \
            echo "✅ Checkout succeeded via ghproxy" && exit 0 || \
          echo "❌ ghproxy failed, trying alternative mirror..."

          # 方法3: 使用mirror.ghproxy
          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://mirror.ghproxy.com/https://github.com/${{ github.repository }}.git . && \
            echo "✅ Checkout succeeded via mirror.ghproxy" && exit 0 || \
          echo "❌ All mirrors failed"

          echo "::error::All checkout methods failed. Please check network connectivity."
          exit 1

      - name: Verify Checkout Success
        run: |
          if [ ! -f "package.json" ]; then
            echo "::error::Checkout verification failed - package.json not found"
            exit 1
          fi
          echo "✅ Repository successfully checked out"
          git log -1 --format="%h - %s (%an, %ar)" || true

      # 步骤1: 先进行轻量级检查,快速失败
      - name: Validate Configuration
        run: |
          echo "🔍 Validating deployment configuration..."

          # 验证必需的秘密变量
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "::error::SERVER_HOST secret is not configured"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_PORT }}" ]; then
            echo "::error::SERVER_PORT secret is not configured"
            exit 1
          fi

          # 验证项目目录是否存在
          if [ ! -d "${{ env.DEPLOY_DIR }}" ]; then
            echo "::error::Deploy directory ${{ env.DEPLOY_DIR }} not found"
            exit 1
          fi

          # 验证关键文件是否存在
          if [ ! -f "${{ env.DEPLOY_DIR }}/docker.sh" ]; then
            echo "::error::docker.sh script not found in ${{ env.DEPLOY_DIR }}"
            exit 1
          fi

          echo "✅ Configuration validated successfully"

      # 步骤2: 统一部署流程 (合并健康检查、备份、部署以减少SSH会话)
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 优化SSH连接参数,减少国内网络延迟
          command_timeout: 15m
          script_stop: true # 遇到错误立即停止
          debug: false # 生产环境关闭debug日志,减少输出开销
          script: |
            set -e  # 遇到错误立即退出

            echo "🚀 Starting unified deployment process at $(date)"

            # 1. 网络诊断
            echo "🌐 Network diagnostics:"
            PING_RESULT=$(ping -c 3 -W 2 github.com 2>&1 | grep -oP 'time=\K[0-9.]+' | head -1 || echo "N/A")
            echo "   GitHub latency: ${PING_RESULT}ms"

            # 2. 预检查
            echo "🏥 Pre-deployment checks..."
            if ! docker info > /dev/null 2>&1; then
              echo "::error::Docker service is not running"
              exit 1
            fi

            DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
            echo "✅ Disk usage: ${DISK_USAGE}%"

            # 进入项目目录
            cd ${{ env.DEPLOY_DIR }} || {
              echo "::error::Project directory not found: ${{ env.DEPLOY_DIR }}"
              exit 1
            }

            # 3. 备份当前版本
            echo "💾 Creating backup..."
            BACKUP_DIR="backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            if [ -f docker-compose.yml ]; then cp docker-compose.yml "$BACKUP_DIR/"; fi
            if [ -f .env ]; then cp .env "$BACKUP_DIR/"; fi

            # 保留最近5个备份
            if [ -d backups ]; then
              cd backups
              ls -t | tail -n +6 | xargs -r rm -rf
              cd ..
            fi
            echo "✅ Backup created: $BACKUP_DIR"

            # 4. 准备环境与配置
            echo "📁 Ensuring directory structure..."
            mkdir -p packages/front-end
            mkdir -p packages/back-end

            # 生成前端环境变量
            FRONTEND_ENV_PATH="packages/front-end/.env"
            echo "📝 Generating frontend .env..."
            cat > $FRONTEND_ENV_PATH <<EOF
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            EOF

            # 生成后端环境变量
            ENV_FILE_PATH="packages/back-end/.env"
            echo "📝 Generating backend .env..."
            cat > $ENV_FILE_PATH <<EOF
            FRONT_END_URL=${{ secrets.FRONT_END_URL }}
            FRONT_END_URL_DEV=${{ secrets.FRONT_END_URL_DEV }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            PORT=${{ secrets.PORT }}
            DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}
            DIFY_BASE_URL=${{ secrets.DIFY_BASE_URL }}
            DIFY_DATASET_ID=${{ secrets.DIFY_DATASET_ID }}
            DIFY_DATASET_API_KEY=${{ secrets.DIFY_DATASET_API_KEY }}
            GITHUB_TOKEN=${{ secrets.GIT_TOKEN }}
            GITHUB_OWNER=${{ secrets.GIT_OWNER }}
            DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
            AI_MODEL_NAME=${{ secrets.AI_MODEL_NAME }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            EOF

            # 生成根目录 .env (用于 docker-compose)
            echo "📝 Generating root .env..."
            cat > .env <<EOF
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            FRONT_END_URL=${{ secrets.FRONT_END_URL }}
            FRONT_END_URL_DEV=${{ secrets.FRONT_END_URL_DEV }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            EOF

            # 显示当前提交信息
            echo "📝 Current commit:"
            git log -1 --format="%h - %s (%an, %ar)" || true

            # 5. 执行部署
            chmod +x docker.sh

            # 配置国内镜像源以加速可能的 npm/pnpm 操作
            export NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
            export PNPM_REGISTRY=https://registry.npmmirror.com

            echo "🔄 Executing docker.sh deploy..."
            ./docker.sh deploy

            echo "✅ Deployment completed at $(date)"

            # 6. 简单验证
            echo "🔍 Verifying services..."
            sleep 5
            docker ps --format "table {{.Names}}\t{{.Status}}" || true

      # 步骤5: 部署后验证
      - name: Post-deployment Verification
        if: always()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script_stop: false
          debug: false
          script: |
            echo "🔍 Running post-deployment verification..."

            cd ${{ env.DEPLOY_DIR }} || exit 1

            # 检查容器运行状态
            echo "📋 Checking container status:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" || true

            # 检查关键服务是否运行
            SERVICES=("ai-agent-backend" "ai-agent-frontend")
            FAILED_SERVICES=()

            for SERVICE in "${SERVICES[@]}"; do
              if docker ps --filter "name=$SERVICE" --filter "status=running" | grep -q "$SERVICE"; then
                echo "✅ $SERVICE is running"
              else
                echo "::error::$SERVICE is not running"
                FAILED_SERVICES+=("$SERVICE")
              fi
            done

            # 如果有服务失败，提供诊断信息
            if [ ${#FAILED_SERVICES[@]} -gt 0 ]; then
              echo "❌ Failed services: ${FAILED_SERVICES[*]}"
              echo "📊 Showing recent logs for failed services:"
              for SERVICE in "${FAILED_SERVICES[@]}"; do
                echo "--- Logs for $SERVICE ---"
                docker logs --tail 50 "$SERVICE" 2>&1 || true
              done
              exit 1
            fi

            echo "✅ All services are running properly"
            echo "🎉 Deployment verification completed successfully"

      # 步骤6: 发送部署通知（可选）
      - name: Send Deployment Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

          echo "=========================================="
          echo "📢 Deployment Summary"
          echo "=========================================="
          echo "Status: $STATUS"
          echo "Time: $TIMESTAMP"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "=========================================="

          if [ "$STATUS" = "success" ]; then
            echo "✅ Deployment succeeded!"
          else
            echo "❌ Deployment failed!"
            echo "Check the logs above for details."
          fi
